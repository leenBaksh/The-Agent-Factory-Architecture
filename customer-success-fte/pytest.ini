[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio mode ──────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit:        Pure unit tests — no external services required
    integration: Integration tests — external services mocked
    load:        Load tests — run separately with Locust
    evals:       Golden dataset evaluation tests

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s

# ── Warnings ──────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:aiokafka
    ignore::DeprecationWarning:sqlalchemy
    ignore::PendingDeprecationWarning
