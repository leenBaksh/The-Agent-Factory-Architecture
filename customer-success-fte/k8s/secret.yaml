# ══════════════════════════════════════════════════════════════════════════════
# Customer Success Digital FTE — Kubernetes Secrets
#
# IMPORTANT: This file is a TEMPLATE.
# Do NOT commit real secrets to version control.
#
# Recommended workflow:
#   1. Copy this file: cp secret.yaml secret.local.yaml
#   2. Fill in real values in secret.local.yaml
#   3. Apply: kubectl apply -f secret.local.yaml
#   4. secret.local.yaml is in .gitignore
#
# For production: use Sealed Secrets, External Secrets Operator, or
# a secrets manager (Vault, AWS Secrets Manager) instead of plain Secrets.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: cs-fte-secrets
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  POSTGRES_PASSWORD: "changeme"                      # ← REQUIRED

  # ── Application keys ────────────────────────────────────────────────────────
  SECRET_KEY: "replace-with-a-long-random-string-min-32-chars"  # ← REQUIRED
  INTERNAL_API_KEY: "replace-with-another-random-string"        # ← REQUIRED

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  OPENAI_API_KEY: "sk-..."                           # ← REQUIRED

  # ── WhatsApp (Meta Cloud API) ────────────────────────────────────────────────
  WHATSAPP_PHONE_NUMBER_ID: ""                       # ← REQUIRED for WhatsApp
  WHATSAPP_ACCESS_TOKEN: ""                          # ← REQUIRED for WhatsApp
  WHATSAPP_VERIFY_TOKEN: ""                          # ← REQUIRED for WhatsApp
  WHATSAPP_APP_SECRET: ""                            # ← REQUIRED for WhatsApp

  # ── SMTP ────────────────────────────────────────────────────────────────────
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_EMAIL: ""

  # ── Notifications ────────────────────────────────────────────────────────────
  SLACK_WEBHOOK_URL: ""
  SUPPORT_TEAM_EMAIL: ""
  APP_BASE_URL: "https://your-domain.com"

---
# Gmail OAuth credentials are stored as a separate Secret and mounted as files.
# Generate locally first:
#   python -m app.gmail_auth   # runs OAuth consent flow
# Then create the secret:
#   kubectl create secret generic cs-fte-gmail-credentials \
#     --namespace=cs-fte \
#     --from-file=gmail_credentials.json=credentials/gmail_credentials.json \
#     --from-file=gmail_token.json=credentials/gmail_token.json
#
# This placeholder keeps the manifest self-documenting.
apiVersion: v1
kind: Secret
metadata:
  name: cs-fte-gmail-credentials
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
type: Opaque
stringData:
  gmail_credentials.json: |
    {}
  gmail_token.json: |
    {}
