---
# ── FastAPI HPA ────────────────────────────────────────────────────────────────
# Scales the API pods based on CPU utilisation.
# min:2 ensures zero-downtime rollouts even at idle.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cs-fte-api
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cs-fte-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cool-down before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# ── Worker HPA ────────────────────────────────────────────────────────────────
# Workers consume Kafka partitions; more workers = more parallelism.
# Kafka distributes 3 partitions across pods automatically.
# max:20 can handle burst traffic across multiple topics × partitions.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cs-fte-worker
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cs-fte-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
