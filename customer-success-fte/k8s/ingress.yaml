# ══════════════════════════════════════════════════════════════════════════════
# Nginx Ingress with TLS via cert-manager (Let's Encrypt).
#
# Prerequisites:
#   1. Nginx Ingress Controller installed in the cluster
#      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
#   2. cert-manager installed
#      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
#   3. ClusterIssuer created (see letsencrypt-issuer.yaml comment below)
#
#   4. Replace "your-domain.com" with your actual domain.
# ══════════════════════════════════════════════════════════════════════════════

---
# Let's Encrypt ClusterIssuer
# Apply once per cluster: kubectl apply -f this section separately or inline here.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@your-domain.com            # ← replace with your ops email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cs-fte-ingress
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # TLS certificate provisioned automatically by cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Proxy timeouts — AI responses can take up to 30s
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # Body size limit for file uploads (web form attachments)
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting — 100 req/s per IP, burst 200
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"

    # WebSocket support (for future streaming endpoints)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "cs-fte/ingress-upstream-headers"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - your-domain.com                 # ← replace with your domain
      secretName: cs-fte-tls-cert
  rules:
    - host: your-domain.com              # ← replace with your domain
      http:
        paths:
          # All traffic → FastAPI (handles routing internally)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cs-fte-api
                port:
                  name: http

---
# Custom upstream headers ConfigMap (referenced by ingress annotation above)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-upstream-headers
  namespace: cs-fte
data:
  Connection: "upgrade"
  Upgrade: "$http_upgrade"
