---
# ── Kafka inbound message worker ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-fte-worker
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-success-fte
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight messages to finish
      containers:
        - name: worker
          image: customer-success-fte:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker"]
          envFrom:
            - configMapRef:
                name: cs-fte-config
            - secretRef:
                name: cs-fte-secrets
          livenessProbe:
            # Workers are long-lived consumers — check they're still alive
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: gmail-credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: gmail-credentials
          secret:
            secretName: cs-fte-gmail-credentials

---
# ── Kafka outbound response handler ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-fte-response-handler
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: response-handler
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: response-handler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-success-fte
        app.kubernetes.io/component: response-handler
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: response-handler
          image: customer-success-fte:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.response_handler"]
          envFrom:
            - configMapRef:
                name: cs-fte-config
            - secretRef:
                name: cs-fte-secrets
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: gmail-credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: gmail-credentials
          secret:
            secretName: cs-fte-gmail-credentials
