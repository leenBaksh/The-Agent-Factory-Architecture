---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-fte-api
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime — always keep 2 pods available
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-success-fte
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Run DB schema migration / init before the first pod starts.
        # Subsequent pods skip this once the schema exists (idempotent DDL).
        - name: db-migrate
          image: customer-success-fte:latest   # same image as main container
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.init_db"]
          envFrom:
            - configMapRef:
                name: cs-fte-config
            - secretRef:
                name: cs-fte-secrets
      containers:
        - name: api
          image: customer-success-fte:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: cs-fte-config
            - secretRef:
                name: cs-fte-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: gmail-credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: gmail-credentials
          secret:
            secretName: cs-fte-gmail-credentials
            items:
              - key: gmail_credentials.json
                path: gmail_credentials.json
              - key: gmail_token.json
                path: gmail_token.json

---
apiVersion: v1
kind: Service
metadata:
  name: cs-fte-api
  namespace: cs-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
