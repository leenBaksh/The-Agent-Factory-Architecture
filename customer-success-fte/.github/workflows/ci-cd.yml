# CI/CD Pipeline for Customer Success Digital FTE
# 
# This workflow handles:
# - Code quality checks (linting, type checking)
# - Unit and integration tests
# - Security scanning
# - Docker image build and push
# - Kubernetes deployment

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

# Environment variables
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.12'

# Cancel in-progress runs for PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code Quality ─────────────────────────────────────────────────────────────
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./customer-success-fte
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy pytest pytest-cov
    
    - name: Lint with Ruff
      working-directory: ./customer-success-fte
      run: |
        ruff check . --output-format=github
    
    - name: Type check with MyPy
      working-directory: ./customer-success-fte
      run: |
        mypy app/ --no-error-summary
    
    - name: Check formatting
      working-directory: ./customer-success-fte
      run: |
        ruff format . --check

  # ── Security Scan ────────────────────────────────────────────────────────────
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./customer-success-fte
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
    
    - name: Run Bandit (security linter)
      working-directory: ./customer-success-fte
      run: |
        bandit -r app/ -f json -o bandit-report.json || true
    
    - name: Run Safety (dependency vulnerabilities)
      working-directory: ./customer-success-fte
      run: |
        safety check -r requirements.txt --json > safety-report.json || true
    
    - name: Run Pip Audit
      working-directory: ./customer-success-fte
      run: |
        pip-audit -r requirements.txt || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          customer-success-fte/bandit-report.json
          customer-success-fte/safety-report.json

  # ── Tests ────────────────────────────────────────────────────────────────────
  
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customer_success_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      zookeeper:
        image: bitnami/zookeeper:3.9
        env:
          ALLOW_ANONYMOUS_LOGIN: "yes"
        ports:
          - 2181:2181
      
      kafka:
        image: bitnami/kafka:3.7
        env:
          KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
          KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092"
          KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
          ALLOW_PLAINTEXT_LISTENER: "yes"
        ports:
          - 9092:9092
        depends_on:
          zookeeper:
            condition: service_healthy
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./customer-success-fte
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx
    
    - name: Run tests
      working-directory: ./customer-success-fte
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/customer_success_test
        KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        OPENAI_API_KEY: test-key
        SECRET_KEY: test-secret-key
        INTERNAL_API_KEY: test-internal-key
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          customer-success-fte/coverage.xml
          customer-success-fte/htmlcov/

  # ── Build Docker Image ───────────────────────────────────────────────────────
  
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, tests]
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
    
    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ./customer-success-fte
        file: ./customer-success-fte/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
    
    - name: Build sandboxed image
      uses: docker/build-push-action@v5
      with:
        context: ./customer-success-fte
        file: ./customer-success-fte/Dockerfile.sandboxed
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sandboxed-${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.29.0'
    
    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
    
    - name: Deploy to Kubernetes
      working-directory: ./customer-success-fte
      run: |
        # Update image in deployment
        kubectl set image deployment/customer-success-fte \
          customer-success-fte=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --record
        
        # Wait for rollout
        kubectl rollout status deployment/customer-success-fte --timeout=300s
    
    - name: Verify deployment
      run: |
        kubectl get pods -l app=customer-success-fte
        kubectl get svc customer-success-fte

  # ── Deploy to Production ─────────────────────────────────────────────────────
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.29.0'
    
    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > ~/.kube/config
    
    - name: Deploy to Kubernetes
      working-directory: ./customer-success-fte
      run: |
        # Update image in deployment
        kubectl set image deployment/customer-success-fte \
          customer-success-fte=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
          --record
        
        # Wait for rollout
        kubectl rollout status deployment/customer-success-fte --timeout=600s
    
    - name: Verify deployment
      run: |
        kubectl get pods -l app=customer-success-fte
        kubectl get svc customer-success-fte
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: true
        files: |
          customer-success-fte/README.md
          customer-success-fte/CHANGELOG.md
