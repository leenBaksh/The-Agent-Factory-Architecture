apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: workflows
  namespace: agent-factory
spec:
  type: workflow.redis
  version: v1
  metadata:
  - name: redisHost
    value: "redis-master:6379"
  - name: redisPassword
    secretKeyRef:
      name: redis-password
      key: redis-password
scopes:
- customer-success-fte
- sales-support-fte
- technical-support-fte
