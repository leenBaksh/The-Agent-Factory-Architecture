# Kafka Topic Definitions for Digital FTE Infrastructure
# These topics form the event backbone for all FTE operations
#
# Customer Success FTE topics (matching .env configuration)
# Infrastructure-level topics for cross-FTE communication

# ── Customer Success FTE Topics ──────────────────────────────────────────────

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cs-fte-messages-inbound
  namespace: agent-factory
  labels:
    strimzi.io/cluster: agent-factory-kafka
spec:
  topicName: cs-fte.messages.inbound
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000  # 7 days
    cleanup.policy: delete
    segment.bytes: 1073741824  # 1GB

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
