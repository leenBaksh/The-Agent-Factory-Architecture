# ══════════════════════════════════════════════════════════════════════════════
# Kubernetes Secrets for Digital FTEs
# 
# IMPORTANT: These are placeholder values. Replace with actual secrets using:
# - kubectl create secret command
# - Sealed Secrets
# - External Secrets Operator
# - Vault Secrets Operator
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: agent-factory
type: Opaque
stringData:
  # Database connection string (replace with actual value)
  database-url: "postgresql+asyncpg://postgres:postgres@postgres:5432/customer_success"
  
  # OpenAI API key
  openai-api-key: "sk-your-openai-api-key-here"
  
  # Anthropic API key
  anthropic-api-key: "sk-ant-your-anthropic-api-key-here"
  
  # Secret key for session signing
  secret-key: "your-secret-key-change-in-production"
  
  # Internal API key for service-to-service auth
  internal-api-key: "your-internal-api-key-here"
  
  # Slack bot token (for customer-success-fte)
  slack-bot-token: "xoxb-your-slack-bot-token-here"

---

# Redis password secret (for Dapr state store)
apiVersion: v1
kind: Secret
metadata:
  name: redis-password
  namespace: agent-factory
type: Opaque
stringData:
  redis-password: ""  # Leave empty for local dev, set for production
