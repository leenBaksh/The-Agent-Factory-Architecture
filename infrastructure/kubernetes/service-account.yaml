# ══════════════════════════════════════════════════════════════════════════════
# Service Account for Digital FTEs
# 
# Grants permissions for pods to access Kubernetes API and other resources.
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fte-service-account
  namespace: agent-factory
  labels:
    app: digital-fte
---

# Role for FTE pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fte-role
  namespace: agent-factory
rules:
  # Allow reading secrets (for configuration)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Allow reading configmaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Allow reading pod information
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Allow reading services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

---

# Bind role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fte-role-binding
  namespace: agent-factory
subjects:
  - kind: ServiceAccount
    name: fte-service-account
    namespace: agent-factory
roleRef:
  kind: Role
  name: fte-role
  apiGroup: rbac.authorization.k8s.io
