apiVersion: v1
kind: Service
metadata:
  name: customer-success-fte
  namespace: agent-factory
  labels:
    app: customer-success-fte
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: customer-success-fte
---
