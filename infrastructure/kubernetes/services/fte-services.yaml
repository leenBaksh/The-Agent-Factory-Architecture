# Agent Factory Backend Service (exposed to dashboard)
apiVersion: v1
kind: Service
metadata:
  name: agent-factory-backend
  namespace: agent-factory
  labels:
    app: agent-factory-backend
spec:
  type: ClusterIP
  ports:
