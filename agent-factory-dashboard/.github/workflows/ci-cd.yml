# CI/CD Pipeline for Agent Factory Dashboard
# 
# This workflow handles:
# - Code quality checks (linting, type checking)
# - Unit tests
# - Build verification
# - Deployment to Vercel

name: Dashboard CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'agent-factory-dashboard/**'
    tags: ['v*']
  pull_request:
    branches: [main, develop]
    paths:
      - 'agent-factory-dashboard/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code Quality ─────────────────────────────────────────────────────────────
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./agent-factory-dashboard
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: agent-factory-dashboard/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Type check with TypeScript
      run: npx tsc --noEmit

  # ── Build ────────────────────────────────────────────────────────────────────
  
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    defaults:
      run:
        working-directory: ./agent-factory-dashboard
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: agent-factory-dashboard/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dashboard-build
        path: agent-factory-dashboard/.next
        retention-days: 7

  # ── Deploy to Vercel ─────────────────────────────────────────────────────────
  
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./agent-factory-dashboard
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: agent-factory-dashboard/package-lock.json
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel environment
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build project
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy to Vercel
      run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
